<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Initial theme: green. The intro shows the fire avatar over a green
         page (intentional contrast); the theme only swaps when the user
         toggles via hover/tap on the avatar. -->
    <script>
      document.documentElement.dataset.theme = "green";
    </script>

    <title>Kalamarico — Electronic Music Producer</title>
    <meta name="description" content="Kalamarico — Electronic music producer & techno DJ from Madrid. Co-CEO of Beta-Time Records. Stream releases on Spotify, Apple Music, Beatport and more." />
    <meta name="author" content="Kalamarico" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="canonical" href="https://kalamarico.com/" />
    <link rel="alternate" type="text/markdown" href="/index.md" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Kalamarico" />
    <meta property="og:type" content="music.musician" />
    <meta property="og:title" content="Kalamarico — Electronic Music Producer" />
    <meta property="og:description" content="Electronic music producer & techno DJ from Madrid. Co-CEO of Beta-Time Records." />
    <meta property="og:url" content="https://kalamarico.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://kalamarico.com/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kalamarico — Electronic music producer & techno DJ from Madrid" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kalamarico — Electronic Music Producer" />
    <meta name="twitter:description" content="Electronic music producer & techno DJ from Madrid. Co-CEO of Beta-Time Records." />
    <meta name="twitter:image" content="https://kalamarico.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="Kalamarico — Electronic music producer & techno DJ from Madrid" />

    <!-- Performance: connect early, preload hero LCP image, swap fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="preload" as="image" href="/avatars/avatar-green.jpeg" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Crafted by Kalamarico -->
  </body>
</html>
